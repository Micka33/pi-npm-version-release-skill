<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">pi-npm-version-release-skill visual</title>
  <desc id="desc">A stylized release automation dashboard showing a semver tag flowing through GitHub Actions to npm and GitHub releases.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#220b3d"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#172033" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="smallGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="260" cy="160" r="260" fill="url(#glowCyan)"/>
  <circle cx="1000" cy="470" r="300" fill="url(#glowViolet)"/>

  <g opacity="0.35" fill="none" stroke="#38bdf8" stroke-width="2">
    <path d="M90 505 C210 455 278 520 376 458"/>
    <path d="M820 110 C905 78 986 120 1088 82"/>
  </g>

  <g transform="translate(76 70)">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="1048" height="490" rx="34" fill="#0b1220" stroke="#334155" stroke-opacity="0.8"/>
      <rect x="1" y="1" width="1046" height="488" rx="33" fill="url(#card)"/>
      <rect x="0" y="0" width="1048" height="8" rx="4" fill="url(#accent)"/>
    </g>

    <g transform="translate(50 44)">
      <circle cx="34" cy="34" r="34" fill="#111827" stroke="#22d3ee" stroke-width="2"/>
      <text x="34" y="45" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="40" font-weight="800" fill="#e0f2fe">π</text>
      <text x="88" y="30" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="#38bdf8">PI PACKAGE</text>
      <text x="88" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="50" font-weight="850" fill="#f8fafc">npm version release skill</text>
      <text x="90" y="101" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#cbd5e1">Add the workflow, tag the version, verify the release.</text>
    </g>

    <g transform="translate(70 190)">
      <rect x="0" y="0" width="235" height="150" rx="24" fill="#08111f" stroke="#334155"/>
      <circle cx="42" cy="42" r="22" fill="#1d4ed8" opacity="0.18"/>
      <path d="M35 42h75m-16-18 18 18-18 18" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#smallGlow)"/>
      <text x="28" y="98" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="750" fill="#f8fafc">semver tag</text>
      <text x="28" y="127" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="24" font-weight="800" fill="#67e8f9">v1.2.3</text>
    </g>

    <g transform="translate(370 155)">
      <rect x="0" y="0" width="305" height="220" rx="28" fill="#0f172a" stroke="#475569"/>
      <rect x="28" y="26" width="249" height="42" rx="13" fill="#172554" stroke="#2563eb" stroke-opacity="0.6"/>
      <text x="52" y="54" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#dbeafe">GitHub Actions</text>
      <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#e2e8f0">
        <circle cx="43" cy="105" r="9" fill="#22c55e"/>
        <text x="64" y="112">prepare release</text>
        <circle cx="43" cy="145" r="9" fill="#22c55e"/>
        <text x="64" y="152">pack artifact</text>
        <circle cx="43" cy="185" r="9" fill="#f97316"/>
        <text x="64" y="192">publish + notes</text>
      </g>
    </g>

    <g transform="translate(748 190)">
      <rect x="0" y="0" width="235" height="150" rx="24" fill="#08111f" stroke="#334155"/>
      <rect x="30" y="30" width="54" height="54" rx="13" fill="#cb3837"/>
      <text x="57" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="900" fill="#fff">npm</text>
      <path d="M116 42h60m-26-18 26 18-26 18" fill="none" stroke="#fb923c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#smallGlow)"/>
      <text x="28" y="112" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="750" fill="#f8fafc">release package</text>
      <text x="28" y="137" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#cbd5e1">npm + GitHub release</text>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M305 265 H355" stroke="#38bdf8" stroke-width="5" filter="url(#smallGlow)"/>
      <path d="M340 250 l16 15 -16 15" stroke="#38bdf8" stroke-width="5"/>
      <path d="M675 265 H732" stroke="#fb923c" stroke-width="5" filter="url(#smallGlow)"/>
      <path d="M718 250 l16 15 -16 15" stroke="#fb923c" stroke-width="5"/>
    </g>

    <g transform="translate(70 390)">
      <rect x="0" y="0" width="913" height="58" rx="16" fill="#020617" stroke="#1e293b"/>
      <circle cx="30" cy="29" r="6" fill="#ef4444"/>
      <circle cx="52" cy="29" r="6" fill="#f59e0b"/>
      <circle cx="74" cy="29" r="6" fill="#22c55e"/>
      <text x="104" y="36" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="20" fill="#c4b5fd">git tag v1.2.3 &amp;&amp; git push origin main v1.2.3</text>
      <text x="722" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#86efac">verified</text>
    </g>
  </g>
</svg>
